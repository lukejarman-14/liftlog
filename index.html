<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary meta -->
    <title>Vector Football — AI Football Training &amp; S&amp;C App</title>
    <meta name="description" content="Elite football strength &amp; conditioning — personalised AI-generated training programmes, periodisation, and fitness testing for footballers." />
    <meta name="keywords" content="football training app, football strength and conditioning, footballer fitness, football S&C, AI training plan, football gym programme, pre-season football, football periodisation" />
    <meta name="author" content="Vector Football" />

    <!-- PWA / install -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f97316" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Vector" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Vector Football" />
    <meta property="og:title" content="Vector Football — AI Football Training &amp; S&amp;C App" />
    <meta property="og:description" content="Elite football strength &amp; conditioning — personalised AI-generated training programmes, periodisation, and fitness testing for footballers." />
    <meta property="og:url" content="https://vectorfootball.co.uk" />
    <meta property="og:image" content="https://vectorfootball.co.uk/icon-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Vector Football — AI Football Training &amp; S&amp;C App" />
    <meta name="twitter:description" content="Elite football S&amp;C — personalised training programmes and fitness testing for footballers." />
    <meta name="twitter:image" content="https://vectorfootball.co.uk/icon-512.png" />

    <!-- Prevent phone number / address detection on iOS -->
    <meta name="format-detection" content="telephone=no, address=no, email=no" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Capture Supabase auth redirect before any module script runs (external for CSP). -->
    <script src="/auth-detect.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
