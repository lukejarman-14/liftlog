[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Serverless functions (live waitlist count → Mailchimp)
[functions]
  directory = "netlify/functions"

# Waitlist pages — served before the SPA catch-all
[[redirects]]
  from = "/waitlist"
  to = "/waitlist/index.html"
  status = 200
  force = true

# Marketing landing page — must be served before the SPA catch-all
[[redirects]]
  from = "/landing"
  to = "/landing.html"
  status = 200
  force = true

# Static files that must NOT be caught by the SPA fallback
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  force = true

# SPA fallback — all other routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security & performance headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # Force HTTPS for a year incl. subdomains. (Add `; preload` + submit to the
    # HSTS preload list only after confirming every subdomain is HTTPS-only.)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # Content Security Policy
    # script-src 'self' — all JS is bundled; no inline scripts (auth-detect.js is external)
    # style-src 'unsafe-inline' — React inline style props (e.g. style={{ fontSize }}) require this
    # connect-src — Supabase REST + realtime, PostHog analytics
    # hcaptcha.com / *.hcaptcha.com — invisible CAPTCHA on auth (script + challenge
    #   iframe + asset/verify calls + injected styles). Without these the widget is
    #   blocked by CSP and auth breaks while Supabase CAPTCHA enforcement is on.
    # form-action — allows Stripe Checkout redirect from our origin
    # frame-ancestors 'none' — belt-and-suspenders with X-Frame-Options
    # *.sentry.io — error-monitoring ingest endpoint (was being CSP-blocked, so no
    #   events were reaching Sentry until this was added to connect-src).
    Content-Security-Policy = "default-src 'none'; script-src 'self' https://*.posthog.com https://posthog.com https://hcaptcha.com https://*.hcaptcha.com; style-src 'self' 'unsafe-inline' https://hcaptcha.com https://*.hcaptcha.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.posthog.com https://posthog.com https://hcaptcha.com https://*.hcaptcha.com https://*.sentry.io; font-src 'self'; manifest-src 'self'; frame-src https://hcaptcha.com https://*.hcaptcha.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self' https://checkout.stripe.com;"

# Waitlist pages use Google Fonts + Mailchimp JSONP — needs its own CSP
[[headers]]
  for = "/waitlist/*"
  [headers.values]
    Content-Security-Policy = "default-src 'none'; script-src 'self' https://*.list-manage.com https://*.posthog.com https://posthog.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.list-manage.com https://*.posthog.com https://posthog.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self';"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/manifest+json"
