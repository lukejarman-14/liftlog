[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security & performance headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # Content Security Policy
    # script-src 'self' — all JS is bundled; no inline scripts (auth-detect.js is external)
    # style-src 'unsafe-inline' — React inline style props (e.g. style={{ fontSize }}) require this
    # connect-src — Supabase REST + realtime, PostHog analytics
    # form-action — allows Stripe Checkout redirect from our origin
    # frame-ancestors 'none' — belt-and-suspenders with X-Frame-Options
    Content-Security-Policy = "default-src 'none'; script-src 'self' https://*.posthog.com https://posthog.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.posthog.com https://posthog.com; font-src 'self'; manifest-src 'self'; frame-src 'none'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self' https://checkout.stripe.com;"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/manifest+json"
